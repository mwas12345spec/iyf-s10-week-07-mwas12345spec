<body>

<div class="container">
    <h1>My To-Do List</h1>

    <div class="input-group">
        <input id="todo-input" placeholder="Enter task">
        <button onclick="handleAdd()">Add</button>
    </div>

    <ul id="todo-list"></ul>
</div>

<script src="app.js"></script>

    <script>
function handleAdd() {
    const input = document.getElementById("todo-input");
    if (input.value.trim()) {
        addTodo(input.value);
        input.value = "";
    }
}
</script>


</body>
